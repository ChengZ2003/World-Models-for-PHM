name: Paper submission
description: Propose a verified paper for inclusion
title: "[Paper]: "
labels: ["paper-submission"]
body:
  - type: input
    id: title
    attributes: {label: Paper title}
    validations: {required: true}
  - type: input
    id: authors
    attributes: {label: Authors}
    validations: {required: true}
  - type: input
    id: year
    attributes: {label: Year}
    validations: {required: true}
  - type: input
    id: venue
    attributes: {label: Venue}
    validations: {required: true}
  - type: input
    id: paper_url
    attributes: {label: Paper URL}
    validations: {required: true}
  - type: input
    id: code_url
    attributes: {label: Official code URL, description: Use TODO if no verified URL is available.}
  - type: dropdown
    id: tasks
    attributes:
      label: Tasks
      multiple: true
      options: [Anomaly detection, Anomaly prediction / early warning, Fault diagnosis, Health assessment, Fault prognosis, RUL prediction, Maintenance decision-making]
    validations: {required: true}
  - type: textarea
    id: dataset
    attributes: {label: Dataset or datasets}
    validations: {required: true}
  - type: textarea
    id: rationale
    attributes: {label: Classification rationale}
    validations: {required: true}
  - type: dropdown
    id: category
    attributes:
      label: Proposed World Model category
      options: [Strict World Model, World-Model-Like Dynamics Model, Related Predictive Model, Uncertain]
    validations: {required: true}
  - type: dropdown
    id: scope_confidence
    attributes:
      label: Scope confidence
      options: [High, Medium, Low, Unknown]
    validations: {required: true}
  - type: textarea
    id: dynamics
    attributes:
      label: Evidence for dynamics modeling
      description: Identify the state representation, transition mechanism, and supporting paper section.
    validations: {required: true}
  - type: textarea
    id: rollout
    attributes: {label: Rollout capability}
    validations: {required: true}
  - type: dropdown
    id: rollout_role
    attributes:
      label: Is rollout or future prediction central or auxiliary?
      options: [Central, Auxiliary, Not present, Unclear]
    validations: {required: true}
  - type: checkboxes
    id: verified
    attributes:
      label: Manual verification
      options:
        - label: I checked the title, authors, year, venue, and URLs against official or reliable sources.
          required: true
        - label: I checked the method description in the official paper source rather than relying only on a title, abstract, or repository summary.
          required: true
        - label: I did not submit a model-generated citation or metadata record without manual verification.
          required: true
