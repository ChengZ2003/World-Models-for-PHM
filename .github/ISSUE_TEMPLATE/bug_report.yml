name: Bug report
description: Report a reproducible problem in a script, page, or workflow
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: location
    attributes: {label: File or page}
    validations: {required: true}
  - type: textarea
    id: current
    attributes: {label: Current behavior}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Reproduction steps}
    validations: {required: true}
  - type: textarea
    id: supporting
    attributes: {label: Supporting information}
